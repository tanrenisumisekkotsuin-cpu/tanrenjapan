<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANREN 総合窓口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .premium-input { transition: all 0.3s ease; background-color: #ffffff; }
        .premium-input:focus { outline: none; border-color: #002D5B; box-shadow: 0 0 0 4px rgba(0, 45, 91, 0.1); }
        .choice-card { transition: all 0.2s ease; }
        .choice-card:hover { border-color: #002D5B; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4 sm:p-8">
    <div class="w-full max-w-xl bg-white rounded-2xl p-8 sm:p-10 shadow-2xl border border-slate-100">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-900 tracking-widest text-slate-900 mb-2">TANREN</h1>
            <p class="text-xs font-bold text-blue-800 uppercase tracking-widest">総合ご案内・相談窓口</p>
            <p class="text-xs text-slate-400 mt-3">ご興味のある項目を選択してください。1分で簡単にお答えいただけます。</p>
            <div class="h-[3px] w-12 bg-blue-900 mx-auto mt-4 rounded-full"></div>
        </div>
        <form id="tg-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-2 tracking-wider">お名前 <span class="text-red-500">*</span></label>
                <input type="text" id="entry_name" required placeholder="例：特設 太郎" class="premium-input w-full border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-medium">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-2 tracking-wider">メールアドレス <span class="text-red-500">*</span></label>
                <input type="email" id="entry_email" required placeholder="例：tanren@example.com" class="premium-input w-full border border-slate-200 rounded-xl px-4 py-3.5 text-slate-900 font-medium">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-2 tracking-wider">一番ご興味のある項目を教えてください <span class="text-red-500">*</span></label>
                <div class="space-y-3 mt-3">
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="ジュニアキック・格闘技・ジム" required class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">🧒 ジュニアキック・格闘技・ジム</span>
                    </label>
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="身体のケア・接骨院の施術" class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">🦴 身体のケア・接骨院の施術</span>
                    </label>
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="空き家活用・地域イベント・キッチンカー" class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">🏡 空き家活用・地域イベント・キッチンカー</span>
                    </label>
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="国際武道大学OB・学生のキャリア応援" class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">🎓 国際武道大学OB・学生のキャリア応援</span>
                    </label>
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="国際武道大学OB協力" class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">🎓 国際武道大学OB協力</span>
                    </label>
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="スポンサー協力" class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">🤝 スポンサー協力</span>
                    </label>
                    <label class="choice-card flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer bg-white">
                        <input type="radio" name="entry_interest" value="その他・サポート相談" class="w-4 h-4 text-blue-900">
                        <span class="ml-3 font-bold text-slate-700 text-sm">💬 その他・サポート相談</span>
                    </label>
                </div>
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-950 hover:bg-blue-900 text-white font-bold py-4 rounded-xl tracking-widest text-sm">
                    公式LINEに繋いで相談する
                </button>
            </div>
        </form>
        <div id="success-message" class="hidden text-center py-12 space-y-4">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-900 text-2xl font-bold mb-2">✓</div>
            <h2 class="text-2xl font-bold text-slate-900">送信完了・LINEへ移動します</h2>
            <p class="text-sm text-slate-500">回答を保存しました。画面が切り替わらない場合は、お手数ですがLINEアプリをご確認ください。</p>
        </div>
    </div>
    <iframe name="google-form-target" id="google-form-target" style="position:absolute;left:-9999px;width:1px;height:1px;border:0" title="送信処理"></iframe>
    <script>
        const GOOGLE_FORM = {
            prefillUrl: "https://docs.google.com/forms/d/e/1FAIpQLSdbOWAJ_W0Fxw0Rgt1eG8hfLX_RrUrFdRHQIomlhhH2hjF36Q/viewform?usp=pp_url",
            action: "https://docs.google.com/forms/d/e/1FAIpQLSdbOWAJ_W0Fxw0Rgt1eG8hfLX_RrUrFdRHQIomlhhH2hjF36Q/formResponse",
            entries: {
                interest: "entry.336106506",
                contactOk: "entry.1349474423",
                name: "entry.940001319",
                contact: "entry.564025786",
            },
        };
        const LINE_URL = "https://lin.ee/XFiPwx0i";
        const SUBMIT_TIMEOUT_MS = 5000;
        const LINE_REDIRECT_DELAY_MS = 400;

        const INTEREST_MAP = {
            "ジュニアキック・格闘技・ジム": { type: "other", value: "ジュニアキック・格闘技・ジム" },
            "身体のケア・接骨院の施術": { type: "exact", value: "身体のケア・接骨院の施術" },
            "空き家活用・地域イベント・キッチンカー": { type: "other", value: "空き家活用・地域イベント・キッチンカー" },
            "国際武道大学OB・学生のキャリア応援": { type: "exact", value: "国際武道大学OB・学生のキャリア応援" },
            "国際武道大学OB協力": { type: "other", value: "国際武道大学OB協力" },
            "スポンサー協力": { type: "exact", value: "スポンサー・協賛" },
            "その他・サポート相談": { type: "exact", value: "詳しく話を聞きたい" },
        };

        function buildSubmissionParams(name, email, interest) {
            const params = new URLSearchParams();
            params.append(GOOGLE_FORM.entries.name, name);
            params.append(GOOGLE_FORM.entries.contact, email);
            params.append(GOOGLE_FORM.entries.contactOk, "連絡してもよい");

            const mapped = INTEREST_MAP[interest];
            if (mapped) {
                if (mapped.type === "exact") {
                    params.append(GOOGLE_FORM.entries.interest, mapped.value);
                } else {
                    params.append(GOOGLE_FORM.entries.interest, "__other_option__");
                    params.append(GOOGLE_FORM.entries.interest + ".other_option_response", mapped.value);
                }
            }
            return params;
        }

        function postViaIframe(params) {
            return new Promise(function (resolve) {
                const iframe = document.getElementById("google-form-target");
                let settled = false;

                function finish() {
                    if (settled) return;
                    settled = true;
                    iframe.removeEventListener("load", onLoad);
                    resolve();
                }

                const timeoutId = window.setTimeout(finish, SUBMIT_TIMEOUT_MS);
                let waitingForResponse = false;

                function onLoad() {
                    if (!waitingForResponse) return;
                    window.clearTimeout(timeoutId);
                    finish();
                }

                iframe.addEventListener("load", onLoad);

                const oldProxy = document.getElementById("google-form-proxy");
                if (oldProxy) oldProxy.remove();

                const proxy = document.createElement("form");
                proxy.id = "google-form-proxy";
                proxy.method = "POST";
                proxy.action = GOOGLE_FORM.action;
                proxy.target = "google-form-target";
                proxy.acceptCharset = "UTF-8";
                proxy.style.position = "absolute";
                proxy.style.left = "-9999px";

                params.forEach(function (value, key) {
                    const input = document.createElement("input");
                    input.type = "hidden";
                    input.name = key;
                    input.value = value;
                    proxy.appendChild(input);
                });

                document.body.appendChild(proxy);
                waitingForResponse = true;
                proxy.submit();
            });
        }

        function postViaFetch(params) {
            return fetch(GOOGLE_FORM.action, {
                method: "POST",
                mode: "no-cors",
                credentials: "omit",
                body: params,
                keepalive: true,
            }).catch(function () {});
        }

        function submitToGoogleForm(name, email, interest) {
            const params = buildSubmissionParams(name, email, interest);
            return postViaFetch(params).then(function () {
                return postViaIframe(params);
            });
        }

        function redirectToLine() {
            window.setTimeout(function () {
                window.location.href = LINE_URL;
            }, LINE_REDIRECT_DELAY_MS);
        }

        document.getElementById("tg-form").addEventListener("submit", function (e) {
            e.preventDefault();

            const submitButton = e.target.querySelector('button[type="submit"]');
            if (submitButton) {
                submitButton.disabled = true;
                submitButton.textContent = "送信中...";
            }

            const name = document.getElementById("entry_name").value.trim();
            const email = document.getElementById("entry_email").value.trim();
            const selectedInterest = document.querySelector('input[name="entry_interest"]:checked');
            const interest = selectedInterest ? selectedInterest.value : "";

            submitToGoogleForm(name, email, interest)
                .then(function () {
                    document.getElementById("tg-form").classList.add("hidden");
                    document.getElementById("success-message").classList.remove("hidden");
                    redirectToLine();
                })
                .catch(function () {
                    if (submitButton) {
                        submitButton.disabled = false;
                        submitButton.textContent = "公式LINEに繋いで相談する";
                    }
                    alert("送信に失敗しました。もう一度お試しください。");
                });
        });
    </script>
</body>
</html>
